<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Pit Wall · News Archive · Full 500 Articles</title>
  <meta name="description" content="Complete F1 news archive with 500+ articles and Google-style pagination." />
  <meta name="theme-color" content="#0a0a0a" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;0,800;1,400;1,700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --carbon: #0a0a0a;
      --carbon-2: #131313;
      --carbon-3: #1d1d1d;
      --paper: #f2ece0;
      --paper-2: #e8e1d2;
      --paper-3: #d8d0bf;
      --ink: #0a0a0a;
      --ink-2: #4a4438;
      --ink-3: #8a8172;
      --racing: #e10600;
      --racing-hot: #ff2010;
      --rule: rgba(10,10,10,0.18);
      --gold: #d4a017;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--paper);
      color: var(--ink);
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* YouTube loading bar */
    .loading-bar {
      position: fixed;
      top: 0;
      left: 0;
      height: 3px;
      background: var(--racing);
      z-index: 10000;
      animation: loadingBarAnimation 3.5s ease-out forwards;
    }

    @keyframes loadingBarAnimation {
      0% { width: 0%; }
      40% { width: 60%; }
      100% { width: 100%; }
    }

    .header {
      background: var(--carbon);
      color: #fff;
      padding: 40px 36px;
      border-bottom: 4px solid var(--racing);
      animation: fadeInHeader 0.8s ease-out both;
    }

    @keyframes fadeInHeader {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .header-back {
      display: inline-block;
      margin-bottom: 20px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--racing-hot);
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .header-back:hover { color: #fff; }

    .header-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(32px, 5vw, 52px);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.02em;
    }

    .header-sub {
      font-size: 14px;
      color: rgba(255,255,255,0.7);
      margin-top: 12px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 56px 36px;
    }

    .archive-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 24px;
      margin-bottom: 56px;
    }

    .archive-card {
      background: var(--paper-2);
      border: 1px solid var(--rule);
      padding: 20px;
      transition: all 0.3s ease;
      animation: slideInCard 0.5s ease-out both;
      display: block;
      color: inherit;
      text-decoration: none;
      cursor: pointer;
      position: relative;
    }

    @keyframes slideInCard {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .archive-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(10,10,10,0.12);
    }

    .archive-card:focus-visible {
      outline: 2px solid var(--racing);
      outline-offset: 4px;
    }

    .archive-thumb {
      width: 100%;
      height: 160px;
      background: linear-gradient(135deg, rgba(225,6,0,0.2), rgba(10,10,10,0.1));
      border: 1px solid var(--rule);
      margin-bottom: 14px;
      overflow: hidden;
    }

    .archive-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .archive-category {
      display: inline-block;
      font-family: 'JetBrains Mono', monospace;
      font-size: 8px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      background: var(--racing);
      color: #fff;
      padding: 4px 8px;
      margin-bottom: 10px;
    }

    .archive-title {
      font-family: 'Playfair Display', serif;
      font-size: 16px;
      font-weight: 600;
      line-height: 1.4;
      color: var(--ink);
      margin-bottom: 10px;
    }

    .archive-summary {
      font-size: 13px;
      line-height: 1.6;
      color: var(--ink-2);
      margin-bottom: 14px;
      max-height: calc(1.6em * 2);
      overflow: hidden;
    }

    .archive-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      color: var(--ink-3);
      border-top: 1px solid var(--rule);
      padding-top: 12px;
    }

    .archive-source {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600;
    }

    .archive-link {
      color: var(--racing);
      text-decoration: none;
      border-bottom: 1px dashed currentColor;
      transition: color 0.2s ease;
    }

    .archive-link:hover { color: var(--racing-hot); }

    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 56px;
      padding: 22px 18px 0;
      border-top: 1px solid var(--rule);
      background: linear-gradient(180deg, rgba(255,255,255,0.18), rgba(255,255,255,0.04));
      animation: fadeIn 0.6s ease-out both 0.3s;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .page-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 46px;
      height: 46px;
      padding: 0 16px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      border: 1px solid rgba(10,10,10,0.16);
      background: linear-gradient(180deg, rgba(255,255,255,0.86), rgba(242,236,224,0.95));
      color: var(--ink);
      cursor: pointer;
      text-decoration: none;
      border-radius: 999px;
      box-shadow: 0 8px 18px rgba(10,10,10,0.08);
      transition: transform 0.2s ease, background 0.2s ease, color 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .page-chip:hover:not(.active) {
      transform: translateY(-1px);
      border-color: var(--racing);
      color: var(--racing);
      box-shadow: 0 12px 24px rgba(10,10,10,0.12);
    }

    .page-chip.active {
      background: linear-gradient(135deg, var(--ink), #24201b);
      color: var(--paper);
      border-color: var(--ink);
      box-shadow: 0 14px 28px rgba(10,10,10,0.18);
    }

    .page-chip.nav {
      background: linear-gradient(180deg, rgba(10,10,10,0.94), rgba(10,10,10,0.82));
      color: var(--paper);
      border-color: var(--ink);
      padding-inline: 18px;
      letter-spacing: 0.16em;
    }

    .page-chip.nav:hover {
      background: var(--racing);
      color: #fff;
      border-color: var(--racing);
    }

    .page-gap {
      color: var(--ink-3);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.2em;
      padding: 0 2px;
    }

    .empty-state {
      text-align: center;
      padding: 80px 36px;
      background: linear-gradient(135deg, rgba(225,6,0,0.05), rgba(10,10,10,0.02));
      border: 2px dashed var(--rule);
      margin: 40px 0;
    }

    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .empty-state-title {
      font-family: 'Playfair Display', serif;
      font-size: 24px;
      color: var(--ink);
      margin-bottom: 8px;
    }

    .empty-state-text {
      color: var(--ink-2);
      font-size: 14px;
    }

    @media (max-width: 768px) {
      .container { padding: 32px 20px; }
      .header { padding: 28px 20px; }
      .archive-grid { grid-template-columns: 1fr; }
      .pagination { flex-wrap: wrap; }
    }
  </style>
</head>
<body>

<div class="loading-bar"></div>

<header class="header">
  <a href="index.html" class="header-back">← Back to Dashboard</a>
  <h1 class="header-title">📰 News Archive</h1>
  <p class="header-sub">Browse the complete F1 news backlog with 500+ articles · Curated from top sources</p>
</header>

<section class="container">
  <div class="archive-grid" id="archiveGrid">
    <!-- Populated by JavaScript -->
  </div>

  <div id="emptyState" style="display:none;" class="empty-state">
    <div class="empty-state-icon">📡</div>
    <h2 class="empty-state-title">Loading news archive...</h2>
    <p class="empty-state-text">Fetching articles from the latest feeds. Please check back in a moment.</p>
  </div>

  <nav class="pagination" id="pagination"></nav>
</section>

<script src="https://js.puter.com/v2/"></script>
<script>
const ARCHIVE_CACHE_KEY = 'pw-news-archive-cache';
const SHARED_CACHE_KEYS = ['pw-news-cache', 'pw-news-page-cache'];
const ARTICLES_PER_PAGE = 12;
const PROXY_URL = 'https://f1-news-worker.sar-brawlstars.workers.dev/?v=2';

const FALLBACK_ARCHIVE_ARTICLES = [
  {
    url: 'https://www.formula1.com/en/latest',
    title: 'F1 Official: latest race weekend updates and paddock briefings',
    summary: 'Official Formula 1 updates covering race-week sessions, team updates, and post-race reaction.',
    source: 'Formula1.com',
    category: 'Race Weekend',
    publishedAt: '',
    image: ''
  },
  {
    url: 'https://www.bbc.com/sport/formula1',
    title: 'BBC Sport: Formula 1 headlines and analysis',
    summary: 'Breaking stories and analysis from BBC Sport\'s Formula 1 desk.',
    source: 'BBC Sport',
    category: 'Team News',
    publishedAt: '',
    image: ''
  },
  {
    url: 'https://www.skysports.com/f1/news',
    title: 'Sky Sports F1: paddock stories and race-day updates',
    summary: 'Live desk coverage on strategy, performance trends, and weekend incidents.',
    source: 'Sky Sports F1',
    category: 'Paddock',
    publishedAt: '',
    image: ''
  },
  {
    url: 'https://www.the-race.com/formula-1/',
    title: 'The Race: technical and strategic F1 coverage',
    summary: 'Technical and strategic explainers with context across the full grid.',
    source: 'The Race',
    category: 'Technical',
    publishedAt: '',
    image: ''
  },
  {
    url: 'https://www.motorsport.com/f1/news/',
    title: 'Motorsport.com F1: driver market and regulation notes',
    summary: 'Driver movement, FIA updates, and race-weekend engineering context.',
    source: 'Motorsport.com',
    category: 'Driver Market',
    publishedAt: '',
    image: ''
  },
  {
    url: 'https://www.racefans.net/',
    title: 'RaceFans: independent paddock reporting and live context',
    summary: 'Independent reporting on penalties, strategy calls, and competitive trends.',
    source: 'RaceFans',
    category: 'FIA',
    publishedAt: '',
    image: ''
  }
];

function decodeHtmlEntities(text) {
  const textarea = document.createElement('textarea');
  textarea.innerHTML = text;
  return textarea.value;
}

function escapeHtml(value) {
  return String(value || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function normalizeArticle(raw, idx) {
  return {
    id: raw.id || `${raw.url || raw.link || '#'}|${raw.title || ''}|${idx}`,
    url: raw.url || raw.link || '#',
    title: decodeHtmlEntities(raw.title || raw.headline || ''),
    summary: decodeHtmlEntities(raw.summary || raw.description || ''),
    source: raw.source || 'F1 News',
    category: raw.category || 'Paddock',
    publishedAt: raw.publishedAt || raw.pubDate || '',
    image: raw.image || raw.thumbnail || ''
  };
}

function timeAgo(publishedAt) {
  if (!publishedAt) return 'Fresh';
  const published = new Date(publishedAt);
  if (Number.isNaN(published.getTime())) return 'Fresh';
  const minutes = Math.max(0, Math.round((Date.now() - published.getTime()) / 60000));
  if (minutes < 60) return `${minutes}m ago`;
  const hours = Math.round(minutes / 60);
  if (hours < 24) return `${hours}h ago`;
  const days = Math.round(hours / 24);
  return `${days}d ago`;
}

function extractPuterText(result) {
  if (typeof result === 'string') return result;
  if (!result || typeof result !== 'object') return '';
  return result.text || result.content || result.message || result.response || '';
}

async function rankWithPuter(items) {
  if (!window.puter || !window.puter.ai || typeof window.puter.ai.chat !== 'function') return null;

  const compact = items.slice(0, 60).map((item) => ({
    title: item.title,
    source: item.source,
    category: item.category,
    summary: item.summary,
    publishedAt: item.publishedAt,
    url: item.url
  }));

  const prompt = [
    'Rank these Formula 1 stories from most useful for a fan dashboard to least useful.',
    'Return only a JSON array of story URLs in ranked order.',
    'Prioritize official updates, race-weekend relevance, and high-quality reporting.',
    JSON.stringify(compact)
  ].join('\n\n');

  try {
    const result = await window.puter.ai.chat(prompt);
    const text = extractPuterText(result);
    const match = text.match(/\[[\s\S]*\]/);
    if (!match) return null;
    const parsed = JSON.parse(match[0]);
    if (!Array.isArray(parsed)) return null;
    return parsed.map(String).filter(Boolean);
  } catch {
    return null;
  }
}

function scoreByUrlOrder(items, orderedUrls) {
  if (!Array.isArray(orderedUrls) || !orderedUrls.length) return items;
  const lookup = new Map(orderedUrls.map((url, index) => [url, index]));
  return [...items]
    .sort((a, b) => {
      const aRank = lookup.has(a.url) ? lookup.get(a.url) : Number.MAX_SAFE_INTEGER;
      const bRank = lookup.has(b.url) ? lookup.get(b.url) : Number.MAX_SAFE_INTEGER;
      if (aRank !== bRank) return aRank - bRank;
      return (Date.parse(b.publishedAt || '') || 0) - (Date.parse(a.publishedAt || '') || 0);
    })
    .filter((item, index, all) => all.findIndex((entry) => entry.url === item.url) === index);
}

function readArchiveCache() {
  try {
    const raw = localStorage.getItem(ARCHIVE_CACHE_KEY);
    if (!raw) return { articles: [] };
    return JSON.parse(raw);
  } catch {
    return { articles: [] };
  }
}

function readSharedCache() {
  return SHARED_CACHE_KEYS.flatMap((key) => {
    try {
      const raw = localStorage.getItem(key);
      if (!raw) return [];
      const parsed = JSON.parse(raw);
      return Array.isArray(parsed?.articles) ? parsed.articles : [];
    } catch {
      return [];
    }
  });
}

function writeArchiveCache(articles) {
  try {
    localStorage.setItem(ARCHIVE_CACHE_KEY, JSON.stringify({
      storedAt: new Date().toISOString(),
      articles: articles.slice(0, 500)
    }));
  } catch {}
}

function fallbackArticles() {
  return FALLBACK_ARCHIVE_ARTICLES.map((article, idx) => normalizeArticle(article, idx));
}

async function fetchArchive() {
  const emptyState = document.getElementById('emptyState');

  try {
    let articles = [];
    let page = 1;
    let hasMore = true;

    while (articles.length < 500 && hasMore && page <= 5) {
      try {
        const response = await fetch(PROXY_URL + `&page=${page}`, { cache: 'no-store' });
        if (!response.ok) break;
        const payload = await response.json();
        const newArticles = (payload.articles || []).map(normalizeArticle).filter((item) => item.title && item.url);
        articles = articles.concat(newArticles);
        hasMore = newArticles.length > 0;
        page += 1;
      } catch {
        hasMore = false;
      }
    }

    if (!articles.length) {
      const cached = readArchiveCache();
      articles = (cached.articles || []).map(normalizeArticle);
    }
    if (!articles.length) {
      articles = readSharedCache().map(normalizeArticle);
    }
    if (!articles.length) {
      articles = fallbackArticles();
    }

    const rankedUrls = await Promise.race([
      rankWithPuter(articles),
      new Promise((resolve) => setTimeout(() => resolve(null), 3000))
    ]);
    if (Array.isArray(rankedUrls) && rankedUrls.length) {
      articles = scoreByUrlOrder(articles, rankedUrls);
    }

    if (articles.length) {
      writeArchiveCache(articles);
      renderArchive(articles);
    } else {
      emptyState.style.display = 'block';
    }
  } catch (error) {
    console.error('Archive fetch failed:', error);
    const cached = readArchiveCache();
    const fallback = (cached.articles || []).map(normalizeArticle);
    if (fallback.length) {
      renderArchive(fallback);
    } else {
      emptyState.style.display = 'block';
    }
  }
}

function renderArchive(articles) {
  const archiveGrid = document.getElementById('archiveGrid');
  const pagination = document.getElementById('pagination');
  const emptyState = document.getElementById('emptyState');

  const requestedPage = parseInt(new URLSearchParams(window.location.search).get('page') || '1', 10);
  const totalPages = Math.max(1, Math.ceil(articles.length / ARTICLES_PER_PAGE));
  const currentPage = Math.min(Math.max(requestedPage, 1), totalPages);
  const startIdx = (currentPage - 1) * ARTICLES_PER_PAGE;
  const endIdx = startIdx + ARTICLES_PER_PAGE;
  const pageArticles = articles.slice(startIdx, endIdx);

  emptyState.style.display = 'none';

  archiveGrid.innerHTML = pageArticles.map((article, idx) => `
    <a class="archive-card" href="${escapeHtml(article.url)}" target="_blank" rel="noopener noreferrer" style="animation-delay: ${idx * 0.05}s;">
      <div class="archive-thumb">
        ${article.image ? `<img src="${escapeHtml(article.image)}" alt="${escapeHtml(article.title)}" loading="lazy">` : '<div style="width:100%;height:100%;background:linear-gradient(135deg,rgba(225,6,0,0.2),rgba(10,10,10,0.1));"></div>'}
      </div>
      <div class="archive-category">${escapeHtml(article.category)}</div>
      <h3 class="archive-title">${escapeHtml(article.title)}</h3>
      <p class="archive-summary">${escapeHtml(article.summary)}</p>
      <div class="archive-meta">
        <span class="archive-source">${escapeHtml(article.source)}</span>
        <span>${timeAgo(article.publishedAt)}</span>
      </div>
    </a>
  `).join('');

  const pageNums = [];
  const maxVisible = 7;

  if (totalPages <= maxVisible) {
    for (let i = 1; i <= totalPages; i++) pageNums.push(i);
  } else {
    pageNums.push(1);
    if (currentPage > 3) pageNums.push('...');
    const start = Math.max(2, currentPage - 1);
    const end = Math.min(totalPages - 1, currentPage + 1);
    for (let i = start; i <= end; i++) pageNums.push(i);
    if (currentPage < totalPages - 2) pageNums.push('...');
    pageNums.push(totalPages);
  }

  pagination.innerHTML = '';

  if (currentPage > 1) {
    const prevBtn = document.createElement('a');
    prevBtn.href = `?page=${currentPage - 1}`;
    prevBtn.className = 'page-chip nav';
    prevBtn.textContent = '← Previous';
    pagination.appendChild(prevBtn);
  }

  pageNums.forEach((num) => {
    if (num === '...') {
      const dots = document.createElement('span');
      dots.className = 'page-gap';
      dots.textContent = '···';
      pagination.appendChild(dots);
    } else {
      const btn = document.createElement(num === currentPage ? 'div' : 'a');
      btn.className = num === currentPage ? 'page-chip active' : 'page-chip';
      if (num !== currentPage) {
        btn.href = `?page=${num}`;
        btn.setAttribute('aria-label', `Open page ${num}`);
      } else {
        btn.setAttribute('aria-current', 'page');
      }
      btn.textContent = `L${String(num).padStart(2, '0')}`;
      pagination.appendChild(btn);
    }
  });

  if (currentPage < totalPages) {
    const nextBtn = document.createElement('a');
    nextBtn.href = `?page=${currentPage + 1}`;
    nextBtn.className = 'page-chip nav';
    nextBtn.textContent = 'Next →';
    pagination.appendChild(nextBtn);
  }
}

fetchArchive();
</script>

</body>
</html>
